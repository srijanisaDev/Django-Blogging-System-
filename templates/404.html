<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Page Not Found</title>
		<style>
			:root {
				color-scheme: light;
			}

			body {
				margin: 0;
				font-family: "Trebuchet MS", "Segoe UI", sans-serif;
				background: radial-gradient(circle at 20% 20%, #f6f3ff 0%, #f7f2ee 45%, #eef5f9 100%);
				color: #1b1b1b;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.card {
				width: min(720px, 92vw);
				background: #ffffff;
				border: 1px solid #e9e2d8;
				box-shadow: 0 18px 40px rgba(16, 24, 40, 0.12);
				border-radius: 20px;
				padding: 48px 42px;
			}

			.badge {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				font-size: 12px;
				letter-spacing: 0.2em;
				text-transform: uppercase;
				color: #6a4f2b;
				background: #f7efe6;
				border-radius: 999px;
				padding: 8px 14px;
				margin-bottom: 20px;
			}

			h1 {
				font-size: clamp(36px, 4vw, 48px);
				margin: 0 0 12px 0;
			}

			p {
				margin: 0 0 28px 0;
				font-size: 18px;
				line-height: 1.6;
				color: #3c3c3c;
			}

			.actions {
				display: flex;
				flex-wrap: wrap;
				gap: 12px;
			}

			.btn {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				padding: 12px 20px;
				border-radius: 999px;
				border: none;
				background: #f4a261;
				color: #1b1b1b;
				font-weight: 600;
				text-decoration: none;
				transition: transform 160ms ease, box-shadow 160ms ease;
				box-shadow: 0 12px 18px rgba(244, 162, 97, 0.25);
			}

			.btn:hover,
			.btn:focus {
				transform: translateY(-1px);
				box-shadow: 0 14px 24px rgba(244, 162, 97, 0.35);
			}

			.hint {
				margin-top: 26px;
				font-size: 14px;
				color: #6b6b6b;
			}
		</style>
	</head>
	<body>
		<main class="card" role="main">
			<div class="badge">Error 404</div>
			<h1>Category not found</h1>
			<p>
				The page you are looking for does not exist or was moved. You can head
				back home and keep reading.
			</p>
			<div class="actions">
				<a class="btn" href="/">Take me home</a>
			</div>
			<div class="hint">If you typed the URL, double-check for typos.</div>
		</main>
	</body>
</html>
